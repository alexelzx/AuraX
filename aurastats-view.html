    <h2>AuraStats</h2>

  </div>

    <div class="stat-chip">
      <p class="label">Total Group Aura</p>
      <h3 id="stat-total-aura">0</h3>
    </div>
    <div class="stat-chip">
      <p class="label">Average Daily Aura Won</p>
      <h3 id="stat-avg-daily-won">0</h3>

      <p class="label">Average Daily Aura Lost</p>
      <h3 id="stat-avg-daily-lost">0</h3>
    </div>
    <div class="stat-chip">
      <p class="label">Participant Losing Most</p>
      <h3 id="stat-top-loser">None</h3>
    </div>
    <div class="stat-chip">
      <p class="label">Participant Winning Most</p>
      <h3 id="stat-top-winner">None</h3>
    </div>
  </div>
</article>
