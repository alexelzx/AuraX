<article class="panel glass admin-only">
  <h2>Manage Vote Sessions</h2>
  <ul id="admin-vote-sessions-list" class="list"></ul>
</article>

<article class="panel glass admin-only">
  <h2>Add / Deduct Points</h2>
  <form id="admin-aura-form" class="stack">
    <label>
      Target User
      <select id="admin-target" required></select>
    </label>
    <label>
      Amount (positive or negative)
      <input id="admin-amount" type="number" required placeholder="1000 or -500" />
    </label>
    <label>
      Title
      <input id="admin-title" type="text" required placeholder="Mentorship session" />
    </label>
    <label>
      Description
      <textarea id="admin-description" rows="3" required placeholder="What happened and why"></textarea>
    </label>
    <label>
      Photo Evidence (optional)
      <input id="admin-photo" type="file" accept="image/*" />
    </label>
    <button class="btn btn-primary" type="submit">Submit Transaction</button>
  </form>
</article>

<article class="panel glass admin-only">
  <h2>Approval Workflow</h2>
  <p class="muted">Approve vote proposals before anyone can vote.</p>
  <ul id="vote-approvals-list" class="list"></ul>
  <ul id="pending-requests-list" class="list"></ul>
</article>

<article class="panel glass full-width admin-only">
  <h2>Admin Logs</h2>
  <ul id="logs-list" class="list"></ul>
</article>
