<article class="panel glass admin-only">
  <div class="panel-head">
    <h2>Start Aura Voting Session</h2>
    <p class="muted">Create vote sessions from admin workspace</p>
  </div>
  <form id="vote-session-form" class="stack">
    <label>
      Target Participant
      <select id="vote-session-target" required></select>
    </label>
    <label>
      Reason
      <textarea id="vote-session-reason" rows="3" required placeholder="Why this Aura should be considered"></textarea>
    </label>
    <label>
      Proposed Aura Amount
      <input id="vote-session-amount" type="number" required placeholder="1000 or -500" />
    </label>
    <button class="btn btn-primary" type="submit">Start Vote</button>
  </form>
</article>

<article class="panel glass admin-only">
  <h2>Manage Aura Vote Sessions</h2>
  <ul id="admin-vote-sessions-list" class="list"></ul>
</article>

<article class="panel glass admin-only">
  <h2>Add / Deduct Aura</h2>
  <form id="admin-aura-form" class="stack">
    <label>
      Target User
      <select id="admin-target" required></select>
    </label>
    <label>
      Amount (positive or negative)
      <input id="admin-amount" type="number" required placeholder="1000 or -500" />
    </label>
    <label>
      Title
      <input id="admin-title" type="text" required placeholder="Mentorship session" />
    </label>
    <label>
      Description
      <textarea id="admin-description" rows="3" required placeholder="What happened and why"></textarea>
    </label>
    <label>
      Photo Evidence (optional)
      <input id="admin-photo" type="file" accept="image/*" />
    </label>
    <button class="btn btn-primary" type="submit">Submit Transaction</button>
  </form>
</article>

<article class="panel glass admin-only">
  <h2>Approval Workflow</h2>
  <ul id="pending-requests-list" class="list"></ul>
</article>

<article class="panel glass full-width admin-only">
  <h2>Admin Logs</h2>
  <ul id="logs-list" class="list"></ul>
</article>
